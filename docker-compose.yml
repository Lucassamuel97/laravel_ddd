services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: laravel_ddd_app
    restart: unless-stopped
    user: "${UID:-1000}:${GID:-1000}"
    environment:
      HOME: /tmp
      COMPOSER_HOME: /tmp/.composer
    working_dir: /var/www
    volumes:
      - .:/var/www
    networks:
      - laravel_ddd
    depends_on:
      mysql:
        condition: service_healthy

  nginx:
    image: nginx:alpine
    container_name: laravel_ddd_nginx
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - .:/var/www
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    networks:
      - laravel_ddd
    depends_on:
      - app

  mysql:
    image: mysql:8.0
    container_name: laravel_ddd_mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: laravel_ddd
      MYSQL_ROOT_PASSWORD: root
      MYSQL_PASSWORD: laravel
      MYSQL_USER: laravel
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - laravel_ddd
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 20s
      retries: 10

networks:
  laravel_ddd:
    driver: bridge

volumes:
  mysql_data:
    driver: local
